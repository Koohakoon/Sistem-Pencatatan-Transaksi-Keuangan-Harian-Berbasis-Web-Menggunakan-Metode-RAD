<!DOCTYPE html>
<html lang="id">
<head>

<link rel="icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">

<link rel="stylesheet" href="cursor.css">

<meta charset="UTF-8">
<title>Sistem Keuangan Harian</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;

  display: flex;
  justify-content: center;
  align-items: center;

  height: 100vh;
}

.container {
  text-align: center;
}

h1 {
  font-size: 24px;
  margin-bottom: 40px;
}

/* BUTTON */
.btn {
  position: relative;
  display: block;

  width: 220px;
  margin: 15px auto;
  padding: 15px;

  border: 2px solid #F6D5AC;
  border-radius: 20px;

  background: transparent;
  color: #F6D5AC;

  font-size: 16px;
  cursor: pointer;

  overflow: hidden;
  transition: 0.3s ease;
}

.btn span {
  position: relative;
  z-index: 2;
}

/* BG ANIMATION */
.btn::after {
  content: "";
  position: absolute;
  inset: 0;

  background: #F6D5AC;
  border-radius: 20px;

  transform: scale(0);
  transform-origin: bottom right;

  transition: 0.35s ease;
  z-index: 1;
}

/* GLOW */
.btn::before {
  content: "";
  position: absolute;
  inset: -6px;

  background: #F6D5AC;
  border-radius: 25px;

  opacity: 0;
  filter: blur(20px);

  transition: 0.4s ease;
  z-index: 0;
}

/* CORNER */
.btn .corner {
  position: absolute;
  width: 18px;
  height: 18px;

  bottom: 0;
  right: 0;

  background: #F6D5AC;

  clip-path: polygon(100% 0, 100% 100%, 0 100%);

  transition: 0.3s ease;
  z-index: 2;
}

/* HOVER */
.btn:hover {
  color: #0f172a;
}

.btn:hover::after {
  transform: scale(1);
}

.btn:hover::before {
  opacity: 0.7;
}

.btn:hover .corner {
  opacity: 0;
  transform: scale(0.5);
}

/* ADMIN LINK */
.link-admin {
  margin-top: 15px;
  font-size: 14px;
  color: #F6D5AC;
  cursor: pointer;
}

.link-admin:hover {
  text-decoration: underline;
}

</style>
</head>

<body>

<div class="container">

  <h1>
    Sistem Pencatatan Transaksi Keuangan Harian
  </h1>

  <!-- LOGIN -->
  <button class="btn" onclick="goAuth('login')">
    <span>Login</span>
    <div class="corner"></div>
  </button>

  <!-- SIGN UP -->
  <button class="btn" onclick="goAuth('signup')">
    <span>Sign Up</span>
    <div class="corner"></div>
  </button>

  <!-- ADMIN -->
  <div class="link-admin" onclick="goAdmin()">
    Login sebagai Admin
  </div>

</div>

<script>

/* LOGIN / SIGNUP NAV */
function goAuth(mode) {

  localStorage.setItem("authMode", mode);

  window.location.href =
    "auth.html"; // 🔥 ganti dari auth.php → auth.html
}

/* ADMIN */
function goAdmin() {

  window.location.href =
    "admin.html"; // 🔥 ganti dari admin.php → admin.html
}

</script>

<!-- CURSOR -->
<div class="cursor"></div>
<div class="cursor-outline"></div>

<script src="cursor.js"></script>

</body>
</html>
