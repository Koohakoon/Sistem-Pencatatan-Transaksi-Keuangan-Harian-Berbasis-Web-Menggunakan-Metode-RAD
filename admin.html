<!DOCTYPE html>
<html lang="id">
<head>

<link rel="icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">

<link rel="stylesheet" href="cursor.css">

<meta charset="UTF-8">
<title>Admin Login</title>

<style>

body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;

  display: flex;
  justify-content: center;
  align-items: center;

  height: 100vh;
}

.container {
  width: 300px;
  text-align: center;
}

/* input */
input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;

  border-radius: 10px;
  border: none;
  outline: none;
  box-sizing: border-box;
}

/* tombol */
.btn {
  position: relative;
  width: 100%;
  padding: 12px;

  border: 2px solid #F6D5AC;
  border-radius: 20px;

  background: transparent;
  color: #F6D5AC;

  cursor: pointer;
  overflow: hidden;
  transition: 0.3s ease;
}

.btn span {
  position: relative;
  z-index: 2;
}

.btn::after {
  content: "";
  position: absolute;
  inset: 0;

  background: #F6D5AC;
  border-radius: 20px;

  transform: scale(0);
  transform-origin: bottom right;
  transition: 0.3s ease;
  z-index: 1;
}

.btn:hover {
  color: #0f172a;
}

.btn:hover::after {
  transform: scale(1);
}

/* back */
.back {
  margin-top: 10px;
  cursor: pointer;
  font-size: 14px;
  color: #F6D5AC;
}

.back:hover {
  text-decoration: underline;
}

</style>
</head>

<body>

<div class="container">

  <h2>Login Admin</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button class="btn" onclick="loginAdmin()">
    <span>Login</span>
  </button>

  <div class="back" onclick="goBack()">
    ← Kembali
  </div>

</div>

<script>

// akun admin (frontend only)
const ADMIN = {
  username: "admin",
  password: "12345"
};

// login function
function loginAdmin() {

  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if (user === ADMIN.username && pass === ADMIN.password) {

    // simpan session fake
    localStorage.setItem("isAdmin", "true");

    alert("Login berhasil!");

    // redirect ke dashboard admin HTML
    window.location.href = "admin-dashboard.html";

  } else {
    alert("Username atau password salah!");
  }
}

// back
function goBack() {
  window.location.href = "index.html";
}

</script>

<!-- CUSTOM CURSOR -->
<div class="cursor"></div>
<div class="cursor-outline"></div>

<script src="cursor.js"></script>

</body>
</html>
